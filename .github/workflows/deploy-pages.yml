name: Deploy client to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'client/**'
      - 'shared/**'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # VITE_* are baked at build time. Set repo variables (Settings → Secrets and
      # variables → Actions → Variables) once the server is hosted, then re-run.
      - name: Build client
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
          VITE_SOLANA_RPC: ${{ vars.VITE_SOLANA_RPC }}
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
