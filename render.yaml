# Render.com blueprint for the Aetherbeasts PvP server.
# Deploy: push this repo to GitHub, then "New > Blueprint" on Render and point it
# here. The server runs the workspace via tsx (no build step needed).
#
# After it deploys, set the client's VITE_SERVER_URL to the service URL and
# rebuild the client (e.g. on Netlify/Vercel/static host).
services:
  - type: web
    name: aetherbeasts-server
    runtime: node
    plan: starter # always-warm ($7/mo) — no cold-start delay. (Free sleeps after ~15 min
                  # idle and wakes in ~50s, which breaks launch-day traffic + live battles.)
    region: oregon
    rootDir: .
    buildCommand: npm install --include=dev
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CLIENT_ORIGIN
        value: "*" # tighten to your client origin in production
      - key: TOKEN_MODE
        value: sim # flip to "devnet"/"mainnet" + set AETHER_MINT once a token exists
      # --- on-chain $AETHER gacha (set ALL of these to go live) ---
      # - key: AETHER_MINT
      #   value: "<your pump.fun SPL mint address>"
      # - key: TREASURY_ADDRESS
      #   value: "<the wallet premium summons pay into>"
      # - key: AETHER_DECIMALS
      #   value: "6"
      # - key: SUMMON_USD_1
      #   value: "1.5"
      # - key: SUMMON_USD_10
      #   value: "13.5"
      # - key: AETHER_PRICE_FLOOR_USD
      #   value: "0.00005"   # set near your launch price
      # - key: SOLANA_RPC
      #   value: "<a paid mainnet RPC — Helius/QuickNode>"
      # --- LUMEN cash-out economy (set these to open the Aether Exchange) ---
      # - key: LUMEN_ENABLED
      #   value: "true"
      # - key: EXCHANGE_ENABLED
      #   value: "true"   # the cash-out kill-switch — flip to false to pause payouts instantly
      # - key: REWARDS_POOL_SEED_AETHER
      #   value: "<amount of $AETHER you sent to the treasury to seed payouts>"
      # - key: PAYOUT_MAX_PER_TX_AETHER
      #   value: "0"      # 0 = no cap; set a ceiling for defense-in-depth
      # - key: PAYOUT_MAX_PER_DAY_AETHER
      #   value: "0"
      # - key: TREASURY_SECRET_KEY
      #   sync: false     # SECRET — set the treasury signing key in the dashboard, NEVER in this file
      # IMPORTANT: without this, accounts/saves live only in memory and are LOST on
      # every restart, redeploy, or free-tier sleep. Set the value in the Render
      # dashboard to a Postgres connection string — a FREE Neon (neon.tech) or
      # Supabase database works and needs no card. The server auto-creates its tables.
      - key: DATABASE_URL
        sync: false # set the secret value in the Render dashboard, not in this file

# Alternatively, let Render provision a managed Postgres (may require billing):
# databases:
#   - name: aetherbeasts-db
#     plan: free
